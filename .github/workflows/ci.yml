name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  check-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Syntax check (node --check)
        run: npm run check
      - name: Unit tests (node:test, zero dependency)
        run: npm test
      - name: Forbidden-term scan
        run: npm run scan
